version: "3.9"

services:
  api:
    build: .
    container_name: rag-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db
    env_file:
      - .env
    command: uvicorn src.api:app --host 0.0.0.0 --port 8000 --reload

  ui:
    build: .
    container_name: rag-ui
    ports:
      - "8501:8501"
    depends_on:
      - api
    env_file:
      - .env
    environment:
      - API_URL=http://api:8000
    command: streamlit run src/app.py --server.port 8501 --server.address 0.0.0.0
